services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data/chroma:/app/data/chroma

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend